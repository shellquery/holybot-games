<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>塞尔达风格的3D世界 🌲</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', serif;
        }
        #gameCanvas {
            display: block;
        }
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
        }
        .ui-box {
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            color: #fff;
            font-size: 1.2rem;
            border: 2px solid rgba(255,215,0,0.5);
        }
        #hearts {
            color: #ff4444;
            font-size: 1.5rem;
            letter-spacing: 5px;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 10px;
            z-index: 100;
        }
        @media (max-width: 768px) {
            #controls { display: flex; }
        }
        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 50%;
            color: #ffd700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 5px;
        }
        #startScreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #1a1a3e 0%, #0a0a1e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.5s;
        }
        #startScreen h1 {
            font-size: 3rem;
            color: #ffd700;
            text-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00; }
            to { text-shadow: 0 0 50px #ffd700, 0 0 100px #ff8c00; }
        }
        #startScreen p {
            color: #888;
            margin-bottom: 40px;
        }
        .start-btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 150;
            pointer-events: none;
        }
        #message.show { opacity: 1; }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>🌲 塞尔达世界 🌲</h1>
        <p>探索神秘的3D森林，寻找神庙和宝藏</p>
        <button class="start-btn" onclick="startGame()">开始冒险</button>
    </div>
    
    <div id="ui">
        <div class="ui-box">❤️ <span id="hearts">❤️❤️❤️</span></div>
        <div class="ui-box">💎 <span id="gems">0</span></div>
    </div>
    
    <div id="message"></div>
    
    <div id="controls">
        <div class="dpad">
            <div></div>
            <div class="ctrl-btn" id="btn-up">⬆️</div>
            <div></div>
            <div class="ctrl-btn" id="btn-left">⬅️</div>
            <div class="ctrl-btn" id="btn-down">⬇️</div>
            <div class="ctrl-btn" id="btn-right">➡️</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game state
        let scene, camera, renderer, player;
        let keys = {};
        let gems = 0;
        let hearts = 3;
        let isGameStarted = false;
        
        // Player settings
        const playerSpeed = 0.15;
        const turnSpeed = 0.03;
        
        // World objects
        const trees = [];
        const gemsList = [];
        const flowers = [];
        
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 50, 200);
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xfffaed, 1);
            sunLight.position.set(50, 100, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 500;
            sunLight.shadow.camera.left = -100;
            sunLight.shadow.camera.right = 100;
            sunLight.shadow.camera.top = 100;
            sunLight.shadow.camera.bottom = -100;
            scene.add(sunLight);
            
            const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x3d5c35, 0.4);
            scene.add(hemiLight);
            
            // Ground
            createGround();
            
            // Player (Link-like character)
            createPlayer();
            
            // World
            createForest();
            createFlowers();
            createGems();
            createTemple();
            
            // Sky
            createSky();
            
            // Events
            window.addEventListener('resize', onResize);
            document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
            document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
            
            // Mobile controls
            setupMobileControls();
        }
        
        function createGround() {
            // Main ground
            const groundGeo = new THREE.PlaneGeometry(300, 300, 50, 50);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x4a7c3f,
                roughness: 0.9
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Path
            const pathGeo = new THREE.PlaneGeometry(8, 300);
            const pathMat = new THREE.MeshStandardMaterial({ color: 0x8b7355 });
            const path = new THREE.Mesh(pathGeo, pathMat);
            path.rotation.x = -Math.PI / 2;
            path.position.y = 0.01;
            path.receiveShadow = true;
            scene.add(path);
            
            // Grass patches
            for (let i = 0; i < 100; i++) {
                const patchGeo = new THREE.CircleGeometry(Math.random() * 3 + 1, 16);
                const patchMat = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(0.25 + Math.random() * 0.1, 0.6, 0.3 + Math.random() * 0.2)
                });
                const patch = new THREE.Mesh(patchGeo, patchMat);
                patch.rotation.x = -Math.PI / 2;
                patch.position.set(
                    (Math.random() - 0.5) * 200,
                    0.02,
                    (Math.random() - 0.5) * 200
                );
                scene.add(patch);
            }
        }
        
        function createPlayer() {
            player = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.CylinderGeometry(0.4, 0.5, 1.2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.8;
            body.castShadow = true;
            player.add(body);
            
            // Head
            const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.7;
            head.castShadow = true;
            player.add(head);
            
            // Hair
            const hairGeo = new THREE.SphereGeometry(0.38, 16, 16);
            const hairMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const hair = new THREE.Mesh(hairGeo, hairMat);
            hair.position.y = 1.75;
            hair.position.z = -0.1;
            hair.scale.z = 0.8;
            player.add(hair);
            
            // Hat
            const hatGeo = new THREE.ConeGeometry(0.5, 0.4, 16);
            const hatMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
            const hat = new THREE.Mesh(hatGeo, hatMat);
            hat.position.y = 2.0;
            player.add(hat);
            
            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.12, 1.72, 0.3);
            player.add(leftEye);
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.12, 1.72, 0.3);
            player.add(rightEye);
            
            // Sword
            const swordGeo = new THREE.BoxGeometry(0.08, 1.2, 0.02);
            const swordMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.8 });
            const sword = new THREE.Mesh(swordGeo, swordMat);
            sword.position.set(0.5, 1.0, 0.2);
            sword.rotation.z = -0.3;
            player.add(sword);
            
            // Shield
            const shieldGeo = new THREE.CircleGeometry(0.35, 16);
            const shieldMat = new THREE.MeshStandardMaterial({ color: 0xcd853f, side: THREE.DoubleSide });
            const shield = new THREE.Mesh(shieldGeo, shieldMat);
            shield.position.set(-0.45, 0.9, 0.2);
            shield.rotation.y = 0.3;
            player.add(shield);
            
            player.position.set(0, 0, 50);
            scene.add(player);
        }
        
        function createTree(x, z) {
            const tree = new THREE.Group();
            
            // Trunk
            const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 3, 8);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1.5;
            trunk.castShadow = true;
            tree.add(trunk);
            
            // Foliage (multiple layers)
            const colors = [0x228b22, 0x2e8b2e, 0x3cb371];
            for (let i = 0; i < 3; i++) {
                const foliageGeo = new THREE.ConeGeometry(2.5 - i * 0.5, 3 - i * 0.5, 8);
                const foliageMat = new THREE.MeshStandardMaterial({ color: colors[i] });
                const foliage = new THREE.Mesh(foliageGeo, foliageMat);
                foliage.position.y = 3.5 + i * 1.5;
                foliage.castShadow = true;
                tree.add(foliage);
            }
            
            tree.position.set(x, 0, z);
            tree.rotation.y = Math.random() * Math.PI * 2;
            scene.add(tree);
            trees.push(tree);
        }
        
        function createForest() {
            // Create forest around the world
            for (let i = 0; i < 150; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 30 + Math.random() * 100;
                createTree(Math.cos(angle) * radius, Math.sin(angle) * radius);
            }
            
            // Some trees in the center
            for (let i = 0; i < 30; i++) {
                const x = (Math.random() - 0.5) * 80;
                const z = (Math.random() - 0.5) * 80;
                if (Math.abs(x) > 10 || Math.abs(z) > 60) {
                    createTree(x, z);
                }
            }
        }
        
        function createFlowers() {
            const colors = [0xff69b4, 0xff1493, 0xffc0cb, 0xffff00, 0xff6347];
            for (let i = 0; i < 200; i++) {
                const flowerGeo = new THREE.SphereGeometry(0.15, 8, 8);
                const flowerMat = new THREE.MeshStandardMaterial({ 
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
                const flower = new THREE.Mesh(flowerGeo, flowerMat);
                flower.position.set(
                    (Math.random() - 0.5) * 150,
                    0.3 + Math.random() * 0.5,
                    (Math.random() - 0.5) * 150
                );
                scene.add(flower);
                flowers.push({ mesh: flower, baseY: flower.position.y, phase: Math.random() * Math.PI * 2 });
            }
        }
        
        function createGems() {
            const gemGeo = new THREE.OctahedronGeometry(0.4);
            const gemMat = new THREE.MeshStandardMaterial({ 
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.5,
                metalness: 0.9
            });
            
            for (let i = 0; i < 20; i++) {
                const gem = new THREE.Mesh(gemGeo, gemMat.clone());
                gem.position.set(
                    (Math.random() - 0.5) * 100,
                    1,
                    (Math.random() - 0.5) * 100
                );
                scene.add(gem);
                gemsList.push(gem);
            }
        }
        
        function createTemple() {
            // Ancient temple
            const temple = new THREE.Group();
            
            // Platform
            const platformGeo = new THREE.BoxGeometry(15, 1, 15);
            const platformMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
            const platform = new THREE.Mesh(platformGeo, platformMat);
            platform.position.y = 0.5;
            platform.castShadow = true;
            platform.receiveShadow = true;
            temple.add(platform);
            
            // Pillars
            const pillarGeo = new THREE.CylinderGeometry(0.5, 0.6, 8, 8);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0xa0a0a0 });
            const positions = [[-5, -5], [-5, 5], [5, -5], [5, 5]];
            positions.forEach(([x, z]) => {
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.set(x, 4.5, z);
                pillar.castShadow = true;
                temple.add(pillar);
            });
            
            // Top
            const topGeo = new THREE.BoxGeometry(12, 1, 12);
            const top = new THREE.Mesh(topGeo, pillarMat);
            top.position.y = 9;
            top.castShadow = true;
            temple.add(top);
            
            // Glowing orb
            const orbGeo = new THREE.SphereGeometry(1, 16, 16);
            const orbMat = new THREE.MeshBasicMaterial({ color: 0xffd700 });
            const orb = new THREE.Mesh(orbGeo, orbMat);
            orb.position.y = 10;
            temple.add(orb);
            
            temple.position.set(0, 0, -30);
            scene.add(temple);
        }
        
        function createSky() {
            // Clouds
            const cloudGeo = new THREE.SphereGeometry(1, 8, 8);
            const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
            
            for (let i = 0; i < 30; i++) {
                const cloud = new THREE.Group();
                for (let j = 0; j < 5; j++) {
                    const puff = new THREE.Mesh(cloudGeo, cloudMat);
                    puff.position.set(j * 2 - 4, Math.random() * 0.5, Math.random() * 2 - 1);
                    puff.scale.setScalar(1 + Math.random());
                    cloud.add(puff);
                }
                cloud.position.set(
                    (Math.random() - 0.5) * 200,
                    40 + Math.random() * 20,
                    (Math.random() - 0.5) * 200
                );
                scene.add(cloud);
            }
        }
        
        function setupMobileControls() {
            const btnUp = document.getElementById('btn-up');
            const btnDown = document.getElementById('btn-down');
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            
            const handle = (key, active) => {
                if (active) keys[key] = true;
                else keys[key] = false;
            };
            
            btnUp.ontouchstart = () => handle('w', true);
            btnUp.ontouchend = () => handle('w', false);
            btnDown.ontouchstart = () => handle('s', true);
            btnDown.ontouchend = () => handle('s', false);
            btnLeft.ontouchstart = () => handle('a', true);
            btnLeft.ontouchend = () => handle('a', false);
            btnRight.ontouchstart = () => handle('d', true);
            btnRight.ontouchend = () => handle('d', false);
        }
        
        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);
        }
        
        function update() {
            if (!isGameStarted) return;
            
            // Player movement
            const moveSpeed = playerSpeed;
            const rotateSpeed = turnSpeed;
            
            if (keys['w'] || keys['arrowup']) {
                player.position.x += Math.sin(player.rotation.y) * moveSpeed;
                player.position.z += Math.cos(player.rotation.y) * moveSpeed;
            }
            if (keys['s'] || keys['arrowdown']) {
                player.position.x -= Math.sin(player.rotation.y) * moveSpeed;
                player.position.z -= Math.cos(player.rotation.y) * moveSpeed;
            }
            if (keys['a'] || keys['arrowleft']) {
                player.rotation.y += rotateSpeed;
            }
            if (keys['d'] || keys['arrowright']) {
                player.rotation.y -= rotateSpeed;
            }
            
            // Boundary
            player.position.x = Math.max(-120, Math.min(120, player.position.x));
            player.position.z = Math.max(-120, Math.min(120, player.position.z));
            
            // Camera follow
            const cameraOffset = new THREE.Vector3(0, 8, 12);
            cameraOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotation.y);
            camera.position.lerp(player.position.clone().add(cameraOffset), 0.1);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            
            // Animate gems
            gemsList.forEach((gem, i) => {
                gem.rotation.y += 0.02;
                gem.position.y = 1 + Math.sin(Date.now() * 0.003 + i) * 0.3;
                
                // Collect gem
                if (gem.visible && player.position.distanceTo(gem.position) < 1.5) {
                    gem.visible = false;
                    gems += 1;
                    document.getElementById('gems').textContent = gems;
                    showMessage('💎 获得宝石！');
                }
            });
            
            // Animate flowers
            flowers.forEach(f => {
                f.mesh.position.y = f.baseY + Math.sin(Date.now() * 0.002 + f.phase) * 0.1;
            });
            
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        
        function startGame() {
            document.getElementById('startScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('startScreen').style.display = 'none';
            }, 500);
            isGameStarted = true;
            update();
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        init();
    </script>
</body>
</html>
