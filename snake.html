<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holybot 的贪吃蛇 🐍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00d9ff, 0 0 40px #00d9ff;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #00d9ff, 0 0 40px #00d9ff; }
            to { text-shadow: 0 0 30px #e94560, 0 0 60px #e94560; }
        }
        #gameCanvas {
            border: 4px solid #00d9ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.5), inset 0 0 50px rgba(0,0,0,0.5);
            background: #0a0a1a;
        }
        #score {
            font-size: 1.8rem;
            margin: 15px 0;
            color: #00d9ff;
            text-shadow: 0 0 10px #00d9ff;
        }
        #message {
            font-size: 1.2rem;
            height: 30px;
            color: #e94560;
            text-shadow: 0 0 10px #e94560;
        }
        .controls {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }
        .key {
            display: inline-block;
            background: #333;
            padding: 4px 10px;
            border-radius: 5px;
            margin: 0 3px;
            border: 1px solid #555;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="score">分数: 0</div>
    <div id="message"></div>
    <div class="controls">
        <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> 控制方向 | 
        <span class="key">空格</span> 暂停 | 
        <span class="key">R</span> 重新开始
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');

        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        const SPEED = 100;

        let snake = [];
        let food = { x: 5, y: 5 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let paused = false;
        let gameOver = false;
        let gameLoop = null;

        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            direction = { x: 0, y: -1 };
            nextDirection = { x: 0, y: -1 };
            score = 0;
            paused = false;
            gameOver = false;
            scoreEl.textContent = '分数: 0';
            messageEl.textContent = '';
            spawnFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, SPEED);
            draw();
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * TILE_COUNT),
                    y: Math.floor(Math.random() * TILE_COUNT)
                };
                valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function update() {
            if (paused || gameOver) return;

            direction = nextDirection;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 撞墙
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                endGame('撞墙了！💥');
                return;
            }

            // 撞自己
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame('咬到自己了！🤯');
                return;
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '分数: ' + score;
                spawnFood();
                // 每次吃完加速一点点
                if (score % 30 === 0) {
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, Math.max(30, SPEED - score));
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function endGame(msg) {
            gameOver = true;
            messageEl.textContent = msg + ' 按 R 重新开始！';
            clearInterval(gameLoop);
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画食物（闪烁效果）
            const glow = Math.sin(Date.now() / 100) * 0.3 + 0.7;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#e94560';
            ctx.fillStyle = `rgba(233, 69, 96, ${glow})`;
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 画蛇
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? '#00d9ff' : '#0f3460';
                if (isHead) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00d9ff';
                }
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
                ctx.shadowBlur = 0;

                // 蛇眼睛
                if (isHead) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    ctx.fillRect(
                        segment.x * GRID_SIZE + eyeOffset,
                        segment.y * GRID_SIZE + eyeOffset,
                        eyeSize,
                        eyeSize
                    );
                    ctx.fillRect(
                        segment.x * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize,
                        segment.y * GRID_SIZE + eyeOffset,
                        eyeSize,
                        eyeSize
                    );
                }
            });
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const key = e.key;

            if (key === 'r' || key === 'R') {
                init();
                return;
            }

            if (key === ' ') {
                paused = !paused;
                messageEl.textContent = paused ? '已暂停 ⏸️' : '';
                return;
            }

            const keys = {
                'ArrowUp': { x: 0, y: -1 },
                'ArrowDown': { x: 0, y: 1 },
                'ArrowLeft': { x: -1, y: 0 },
                'ArrowRight': { x: 1, y: 0 }
            };

            const newDir = keys[key];
            if (newDir) {
                // 不能直接掉头
                if (!(newDir.x === -direction.x && newDir.y === -direction.y)) {
                    nextDirection = newDir;
                }
                e.preventDefault();
            }
        });

        // 触摸控制（手机支持）
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                nextDirection = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
            } else {
                nextDirection = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
            }
            if (!(nextDirection.x === -direction.x && nextDirection.y === -direction.y)) {
                direction = nextDirection;
            }
        });

        // 开始游戏
        init();
    </script>
</body>
</html>
