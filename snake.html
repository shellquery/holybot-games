<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇 🐍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
            padding: 10px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #00d9ff;
        }
        #gameCanvas {
            border: 3px solid #00d9ff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
            background: #0a0a1a;
            max-width: 100%;
            max-height: 60vh;
        }
        #score {
            font-size: 1.3rem;
            margin: 8px 0;
            color: #00d9ff;
        }
        #message {
            font-size: 1rem;
            min-height: 24px;
            color: #e94560;
            text-align: center;
        }
        
        /* 虚拟方向键 - 手机用 */
        .dpad {
            display: none;
            margin-top: 15px;
            gap: 8px;
        }
        @media (max-width: 768px) {
            .dpad { display: flex; }
            body { padding: 5px; }
            h1 { font-size: 1.5rem; }
        }
        .dpad-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .dpad-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #00d9ff;
            border-radius: 12px;
            color: #00d9ff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(0,217,255,0.3);
        }
        .dpad-center {
            width: 60px;
            height: 60px;
        }
        
        .controls-hint {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <canvas id="gameCanvas"></canvas>
    <div id="score">分数: 0</div>
    <div id="message"></div>
    
    <!-- 手机虚拟方向键 -->
    <div class="dpad">
        <div class="dpad-row">
            <div class="dpad-center"></div>
            <div class="dpad-btn" id="btn-up">⬆️</div>
            <div class="dpad-center"></div>
        </div>
        <div class="dpad-row">
            <div class="dpad-btn" id="btn-left">⬅️</div>
            <div class="dpad-center"></div>
            <div class="dpad-btn" id="btn-right">➡️</div>
        </div>
        <div class="dpad-row">
            <div class="dpad-center"></div>
            <div class="dpad-btn" id="btn-down">⬇️</div>
            <div class="dpad-center"></div>
        </div>
    </div>
    
    <div class="controls-hint">
        电脑: 方向键 | 手机: 触摸滑动 或 下面的按钮
    </div>

    <script>
        // 自适应画布大小
        const maxSize = Math.min(window.innerWidth - 20, window.innerHeight * 0.55, 400);
        const canvas = document.getElementById('gameCanvas');
        canvas.width = maxSize;
        canvas.height = maxSize;
        
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');

        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        const SPEED = 120;

        let snake = [];
        let food = { x: 5, y: 5 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let paused = false;
        let gameOver = false;
        let gameLoop = null;

        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            direction = { x: 0, y: -1 };
            nextDirection = { x: 0, y: -1 };
            score = 0;
            paused = false;
            gameOver = false;
            scoreEl.textContent = '分数: 0';
            messageEl.textContent = '';
            spawnFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, SPEED);
            draw();
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * TILE_COUNT),
                    y: Math.floor(Math.random() * TILE_COUNT)
                };
                valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function update() {
            if (paused || gameOver) return;

            direction = nextDirection;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                endGame('撞墙了！💥 点击重新开始');
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame('咬到自己了！🤯 点击重新开始');
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '分数: ' + score;
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function endGame(msg) {
            gameOver = true;
            messageEl.textContent = msg;
            clearInterval(gameLoop);
        }

        function setDirection(dx, dy) {
            if (!(dx === -direction.x && dy === -direction.y)) {
                nextDirection = { x: dx, y: dy };
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 食物
            const glow = Math.sin(Date.now() / 100) * 0.3 + 0.7;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#e94560';
            ctx.fillStyle = `rgba(233, 69, 96, ${glow})`;
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 蛇
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? '#00d9ff' : '#0f3460';
                if (isHead) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00d9ff';
                }
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
                ctx.shadowBlur = 0;
            });
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (gameOver) { init(); return; }
            
            const keys = {
                'ArrowUp': () => setDirection(0, -1),
                'ArrowDown': () => setDirection(0, 1),
                'ArrowLeft': () => setDirection(-1, 0),
                'ArrowRight': () => setDirection(1, 0)
            };
            
            if (keys[e.key]) { keys[e.key](); e.preventDefault(); }
            if (e.key === ' ') { paused = !paused; messageEl.textContent = paused ? '暂停 ⏸️' : ''; }
        });

        // 虚拟按键控制
        document.getElementById('btn-up').onclick = () => setDirection(0, -1);
        document.getElementById('btn-down').onclick = () => setDirection(0, 1);
        document.getElementById('btn-left').onclick = () => setDirection(-1, 0);
        document.getElementById('btn-right').onclick = () => setDirection(1, 0);
        
        // 点击重新开始
        canvas.onclick = () => { if(gameOver) init(); };

        // 触摸滑动控制
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            if (gameOver) { init(); return; }
            
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const minSwipe = 30;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > minSwipe) setDirection(1, 0);
                else if (dx < -minSwipe) setDirection(-1, 0);
            } else {
                if (dy > minSwipe) setDirection(0, 1);
                else if (dy < -minSwipe) setDirection(0, -1);
            }
        });

        init();
    </script>
</body>
</html>
