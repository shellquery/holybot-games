<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0f172a; color: #fff; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #4ade80; text-align: center; }
        .btn { padding: 10px 20px; margin: 5px; cursor: pointer; background: #4ade80; border: none; border-radius: 8px; }
        .topic-btn { padding: 10px; margin: 5px; background: #334155; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .quiz-card { background: #1e293b; padding: 20px; border-radius: 12px; margin: 20px 0; }
        .option { padding: 12px; background: #334155; margin: 8px 0; border-radius: 8px; cursor: pointer; }
        .option.correct { background: #22c55e; }
        .option.wrong { background: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Home Inspection Quiz</h1>
        <div>Total: <span id="total">0</span> questions</div>
        <div style="margin: 20px 0;">
            <button class="topic-btn" onclick="startQuiz('random')">Random</button>
            <button class="topic-btn" onclick="startQuiz('structure')">Structure</button>
            <button class="topic-btn" onclick="startQuiz('roof')">Roof</button>
            <button class="topic-btn" onclick="startQuiz('plumbing')">Plumbing</button>
            <button class="topic-btn" onclick="startQuiz('electrical')">Electrical</button>
        </div>
        <div id="quiz" class="hidden">
            <div class="quiz-card">
                <div id="q" style="font-size: 18px; margin-bottom: 15px;"></div>
                <div id="opts"></div>
            </div>
            <button class="btn" onclick="next()">Next</button>
        </div>
    </div>
    <script>
var questions = [
    {topic:"structure",q:"Which foundation crack is most concerning?",o:["A. Hairline","B. Vertical >1/4inch","C. Old with paint","D. Around door"],a:1,e:"Vertical cracks may indicate structural issues."},
    {topic:"roof",q:"Missing asphalt shingles?",o:["A. No repair","B. Replace soon","C. Replace all","D. Apply glue"],a:1,e:"Missing causes leakage."},
    {topic:"plumbing",q:"Double-tapped breaker means?",o:["A. Good protection","B. Safety hazard","C. Normal","D. Correct"],a:1,e:"Safety hazard - fire risk."},
    {topic:"electrical",q:"GFCI mainly for?",o:["A. Living room","B. Bedroom","C. Kitchen/bathroom","D. Garage"],a:2,e:"GFCI for wet areas."},
    {topic:"hvac",q:"Filter check frequency?",o:["A. 6 months","B. 1 month","C. 1 year","D. 2 years"],a:1,e:"Check monthly."},
    {topic:"exterior",q:"Wood rot cause?",o:["A. Sunlight","B. Moisture","C. Pests","D. Temperature"],a:1,e:"Moisture is main cause."},
    {topic:"safety",q:"CO detector location?",o:["A. Garage","B. Bedroom hallway","C. Kitchen","D. Outdoor"],a:1,e:"Bedroom and hallway."},
    {topic:"infrared",q:"Thermal imaging for?",o:["A. Detect color","B. Temperature anomalies","C. Measure distance","D. Detect sound"],a:1,e:"Finds temperature anomalies."},
    {topic:"radon",q:"Radon source?",o:["A. Paint","B. Soil/rock","C. Furniture","D. Water"],a:1,e:"From soil and rock."},
    {topic:"mold",q:"Mold needs?",o:["A. Sunlight","B. Moisture","C. Cold","D. Dry"],a:1,e:"Needs moisture."},
    {topic:"asbestos",q:"Asbestos used in?",o:["A. Insulation","B. Roofing","C. Fireproof","D. All"],a:3,e:"Used in many materials."}
];
var qs = [], idx = 0;
document.getElementById('total').textContent = questions.length;
function startQuiz(t) {
    qs = t==='random'? [...questions].sort(()=>Math.random()-.5) : questions.filter(q=>q.topic===t);
    idx = 0;
    document.getElementById('quiz').classList.remove('hidden');
    show();
}
function show() {
    var q = qs[idx];
    document.getElementById('q').textContent = q.q;
    document.getElementById('opts').innerHTML = q.o.map((o,i)=>'<div class="option" onclick="sel('+i+')">'+o+'</div>').join('');
}
function sel(i) {
    var q = qs[idx], els = document.querySelectorAll('.option');
    els.forEach((e,j)=>{ e.classList.remove('correct','wrong'); if(j===q.a)e.classList.add('correct'); else if(j===i)e.classList.add('wrong'); });
}
function next() {
    idx++;
    if(idx<qs.length) show(); else { alert('Done!'); document.getElementById('quiz').classList.add('hidden'); }
}
    </script>
</body>
</html>
