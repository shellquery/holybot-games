    <style>
        :root {
            --primary: #4ade80;
            --primary-dark: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        h1 { text-align: center; margin-bottom: 30px; color: var(--primary); }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .lang-toggle {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            background: var(--card);
            color: var(--text);
        }
        
        .btn:hover { transform: translateY(-2px); }
        
        .btn-primary { background: var(--primary); color: #000; font-weight: bold; }
        .btn-danger { background: var(--danger); color: white; }
        
        .topics {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .topic-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
        }
        
        .topic-btn.active {
            background: var(--primary);
            color: #000;
        }
        
        .quiz-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .question-num {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .question {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            padding: 15px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .option:hover { background: rgba(255,255,255,0.1); }
        
        .option.selected {
            border-color: var(--info);
            background: rgba(59, 130, 246, 0.2);
        }
        
        .option.correct {
            border-color: var(--primary);
            background: rgba(74, 222, 128, 0.2);
        }
        
        .option.wrong {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.2);
        }
        
        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 10px;
            border-left: 4px solid var(--info);
        }
        
        .explanation-title {
            color: var(--info);
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .score-panel {
            text-align: center;
            padding: 40px;
        }
        
        .score-num {
            font-size: 64px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .score-label { color: var(--text-muted); margin-bottom: 20px; }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        
        .stat { text-align: center; }
        .stat-num { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; color: var(--text-muted); }
        
        .correct-count { color: var(--primary); }
        .wrong-count { color: var(--danger); }
        
        .hidden { display: none !important; }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }
        
        @media (max-width: 600px) {
            .header { flex-direction: column; }
            .stats { flex-direction: column; gap: 15px; }
        }
    </style>
</head>

                <button class="topic-btn" onclick="startQuiz('mold')">🍄 Mold / 霉菌检测 (<span id="count-mold">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('asbestos')">⚠️ Asbestos / 石棉检测 (<span id="count-asbestos">0</span>)</button>
            </div>
        </div>
        
        <!-- Quiz Area -->
        <div id="quizArea" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="quiz-card">
                <div class="question-num">

                </div>
                <div class="question" id="question"></div>
                <div class="options" id="options"></div>
                <div class="explanation hidden" id="explanation">
                    <div class="explanation-title">📖 Explanation / 解析:</div>
                    <div id="explanationText"></div>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn" id="prevBtn" onclick="prevQuestion()">◀ Prev / 上一题</button>
                <button class="btn btn-primary hidden" id="nextBtn" onclick="nextQuestion()">Next ▶ / 下一题</button>
                <button class="btn btn-primary hidden" id="showResultBtn" onclick="showResult()">📊 Show Result / 查看结果</button>
            </div>
        </div>
        
        <!-- Result -->

            <div class="score-panel">

                    </div>
                </div>
                <button class="btn btn-primary" onclick="showModeSelect()">🔄 Try Again / 再试一次</button>
            </div>
        </div>

    </div>

            document.getElementById('progressFill').style.width = ((currentIndex + 1) / quizQuestions.length * 100) + '%';
            document.getElementById('question').textContent = langData.question;
            
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            
            langData.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => selectOption(i);
                
                if (answers[currentIndex] !== undefined) {
                    div.classList.add('disabled');
                    if (i === langData.correct) {
                        div.classList.add('correct');
                    } else if (i === answers[currentIndex]) {
                        div.classList.add('wrong');
                    }
                }
                
                optionsEl.appendChild(div);
            });
            
            const expEl = document.getElementById('explanation');
            if (answers[currentIndex] !== undefined) {
                expEl.classList.remove('hidden');
                document.getElementById('explanationText').textContent = langData.explanation;
                
                document.getElementById('nextBtn').classList.remove('hidden');
                if (currentIndex === quizQuestions.length - 1) {
                    document.getElementById('nextBtn').classList.add('hidden');
                    document.getElementById('showResultBtn').classList.remove('hidden');
                }
            } else {
                expEl.classList.add('hidden');
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('showResultBtn').classList.add('hidden');
            }
            
            document.getElementById('prevBtn').classList.toggle('hidden', currentIndex === 0);
        }

        function selectOption(i) {
            if (answers[currentIndex] !== undefined) return;
            
            answers[currentIndex] = i;
            renderQuestion();
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < quizQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        function showResult() {
            let correct = 0;
            answers.forEach((ans, i) => {
                if (ans === quizQuestions[i][currentLang].correct) {
                    correct++;
                }
            });
            
            const total = quizQuestions.length;
            const percentage = Math.round((correct / total) * 100);
            
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            
            document.getElementById('scoreNum').textContent = percentage + '%';
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = total - correct;
        }

        function showModeSelect() {
            document.getElementById('modeSelect').classList.remove('hidden');
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
        }
