<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Home Inspection Quiz | 房屋检查题库</title>
    <style>
        :root {
            --primary: #4ade80;
            --primary-dark: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        h1 { text-align: center; margin-bottom: 30px; color: var(--primary); }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .lang-toggle {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            background: var(--card);
            color: var(--text);
        }
        
        .btn:hover { transform: translateY(-2px); }
        
        .btn-primary { background: var(--primary); color: #000; font-weight: bold; }
        .btn-danger { background: var(--danger); color: white; }
        
        .topics {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .topic-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
        }
        
        .topic-btn.active {
            background: var(--primary);
            color: #000;
        }
        
        .quiz-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .question-num {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .question {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            padding: 15px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .option:hover { background: rgba(255,255,255,0.1); }
        
        .option.selected {
            border-color: var(--info);
            background: rgba(59, 130, 246, 0.2);
        }
        
        .option.correct {
            border-color: var(--primary);
            background: rgba(74, 222, 128, 0.2);
        }
        
        .option.wrong {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.2);
        }
        
        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 10px;
            border-left: 4px solid var(--info);
        }
        
        .explanation-title {
            color: var(--info);
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .score-panel {
            text-align: center;
            padding: 40px;
        }
        
        .score-num {
            font-size: 64px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .score-label { color: var(--text-muted); margin-bottom: 20px; }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        
        .stat { text-align: center; }
        .stat-num { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; color: var(--text-muted); }
        
        .correct-count { color: var(--primary); }
        .wrong-count { color: var(--danger); }
        
        .hidden { display: none !important; }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }
        
        @media (max-width: 600px) {
            .header { flex-direction: column; }
            .stats { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Home Inspection Quiz | 房屋检查题库</h1>
        
        <div class="header">
            <div class="lang-toggle">
                <button class="btn" onclick="setLang('zh')">中文</button>
                <button class="btn" onclick="setLang('en')">English</button>
            </div>
            <button class="btn" onclick="showBrowseMode()">📚 Browse All / 浏览全部</button>
            <button class="btn btn-primary" onclick="showModeSelect()">🔄 New Quiz / 新测验</button>
        </div>
        
        <!-- Search Bar -->
        <div class="quiz-card" style="margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="搜索题目... (中英文)" 
                   style="width: 100%; padding: 12px; border-radius: 8px; border: none; 
                          background: var(--bg); color: var(--text); font-size: 16px;"
                   oninput="searchQuestions(this.value)">
            <div id="searchResults" style="margin-top: 10px; color: var(--text-muted);"></div>
        </div>
        
        <!-- Mode Selection -->
        <div id="modeSelect" class="quiz-card">
            <h2 style="margin-bottom: 20px;">Select Quiz Mode / 选择测验模式</h2>
            <div class="topics">
                <button class="topic-btn" onclick="startQuiz('random')">🎲 Random / 随机 (<span id="total-count">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('structure')">🏗️ Structure / 结构 (<span id="count-structure">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('roof')">🏠 Roof / 屋顶 (<span id="count-roof">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('plumbing')">💧 Plumbing / 水管 (<span id="count-plumbing">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('electrical')">⚡ Electrical / 电路 (<span id="count-electrical">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('hvac')">❄️ HVAC / 暖通 (<span id="count-hvac">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('exterior')">🧱 Exterior / 外墙 (<span id="count-exterior">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('safety')">🔥 Safety / 安全 (<span id="count-safety">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('infrared')">🌡️ Infrared / 红外检测 (<span id="count-infrared">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('radon')">☢️ Radon / 氡气检测 (<span id="count-radon">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('mold')">🍄 Mold / 霉菌检测 (<span id="count-mold">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('asbestos')">⚠️ Asbestos / 石棉检测 (<span id="count-asbestos">0</span>)</button>
            </div>
        </div>
        
        <!-- Quiz Area -->
        <div id="quizArea" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="quiz-card">
                <div class="question-num">
                    <span id="qNum">1</span> / <span id="totalQ">10</span>
                </div>
                <div class="question" id="question"></div>
                <div class="options" id="options"></div>
                <div class="explanation hidden" id="explanation">
                    <div class="explanation-title">📖 Explanation / 解析:</div>
                    <div id="explanationText"></div>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn" id="prevBtn" onclick="prevQuestion()">◀ Prev / 上一题</button>
                <button class="btn btn-primary hidden" id="nextBtn" onclick="nextQuestion()">Next ▶ / 下一题</button>
                <button class="btn btn-primary hidden" id="showResultBtn" onclick="showResult()">📊 Show Result / 查看结果</button>
            </div>
        </div>
        
        <!-- Result -->
        <div id="result" class="quiz-card hidden">
            <div class="score-panel">
                <div class="score-label" id="scoreLabel">Your Score / 你的得分</div>
                <div class="score-num" id="scoreNum">0</div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-num correct-count" id="correctCount">0</div>
                        <div class="stat-label">Correct / 正确</div>
                    </div>
                    <div class="stat">
                        <div class="stat-num wrong-count" id="wrongCount">0</div>
                        <div class="stat-label">Wrong / 错误</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="showModeSelect()">🔄 Try Again / 再试一次</button>
            </div>
        </div>
        
        <!-- Browse All Questions -->
        <div id="browseArea" class="quiz-card hidden">
            <h2 style="margin-bottom: 20px;">📚 题库浏览 / Browse All Questions</h2>
            <div class="topics" id="browseTopics"></div>
            <div id="browseList" style="margin-top: 20px;"></div>
            <div class="pagination" id="pagination" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;"></div>
        </div>
    </div>

        // State
        let currentLang = 'zh';
        let quizQuestions = [];
        let currentIndex = 0;
        let answers = [];

        function setLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en-US';
            if (quizQuestions.length > 0) {
                renderQuestion();
            }
        }

        // Count questions by topic - run immediately since questions is already defined
        (function() {
            const topicCounts = {};
            questions.forEach(q => {
                topicCounts[q.topic] = (topicCounts[q.topic] || 0) + 1;
            });
            
            // Display counts
            const tc = document.getElementById('total-count');
            if(tc) tc.textContent = questions.length;
            const cs = document.getElementById('count-structure');
            if(cs) cs.textContent = topicCounts['structure'] || 0;
            const cr = document.getElementById('count-roof');
            if(cr) cr.textContent = topicCounts['roof'] || 0;

            if(cp) cp.textContent = topicCounts['plumbing'] || 0;

            if(ce) ce.textContent = topicCounts['electrical'] || 0;

            if(crd) crd.textContent = topicCounts['radon'] || 0;

            if(cmo) cmo.textContent = topicCounts['mold'] || 0;
            const cas = document.getElementById('count-asbestos');
            if(cas) cas.textContent = topicCounts['asbestos'] || 0;
        })();
        
        function getTopicCount(topic) {
            return topicCounts[topic] || 0;
        }
        
        // ===== SEARCH FUNCTIONS =====
        function searchQuestions(query) {
            const resultsDiv = document.getElementById('searchResults');
            if (!query || query.length < 2) {
                resultsDiv.innerHTML = '';
                return;
            }
            
            query = query.toLowerCase();
            const results = questions.filter(q => {
                const zh = q.zh.question.toLowerCase().includes(query);
                const en = q.en.question.toLowerCase().includes(query);
                const zhOpts = q.zh.options.some(o => o.toLowerCase().includes(query));
                const enOpts = q.en.options.some(o => o.toLowerCase().includes(query));
                return zh || en || zhOpts || enOpts;
            });
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '未找到匹配题目 / No matching questions found';
            } else {
                resultsDiv.innerHTML = `找到 ${results.length} 道题 / Found ${results.length} questions`;
                resultsDiv.onclick = () => showSearchResults(results);
                resultsDiv.style.cursor = 'pointer';
                resultsDiv.style.color = 'var(--primary)';
            }
        }
        
        function showSearchResults(results) {
            browseQuestions = results;
            currentBrowsePage = 0;
            showBrowseArea();
            renderBrowsePage();
        }
        
        // ===== BROWSE FUNCTIONS =====
        let browseQuestions = [];
        let currentBrowsePage = 0;
        const ITEMS_PER_PAGE = 10;
        
        function showBrowseMode() {
            // Show all questions initially
            browseQuestions = [...questions];
            currentBrowsePage = 0;
            
            // Show topic filter buttons
            const topicsDiv = document.getElementById('browseTopics');
            topicsDiv.innerHTML = `
                <button class="topic-btn active" onclick="filterBrowse('all')">全部 All</button>
                <button class="topic-btn" onclick="filterBrowse('structure')">🏗️ 结构</button>
                <button class="topic-btn" onclick="filterBrowse('roof')">🏠 屋顶</button>
                <button class="topic-btn" onclick="filterBrowse('plumbing')">💧 水管</button>
                <button class="topic-btn" onclick="filterBrowse('electrical')">⚡ 电路</button>
                <button class="topic-btn" onclick="filterBrowse('hvac')">❄️ 暖通</button>
                <button class="topic-btn" onclick="filterBrowse('exterior')">🧱 外墙</button>
                <button class="topic-btn" onclick="filterBrowse('safety')">🔥 安全</button>
                <button class="topic-btn" onclick="filterBrowse('infrared')">🌡️ 红外检测</button>
                <button class="topic-btn" onclick="filterBrowse('radon')">☢️ 氡气检测</button>
                <button class="topic-btn" onclick="filterBrowse('mold')">🍄 霉菌检测</button>
                <button class="topic-btn" onclick="filterBrowse('asbestos')">⚠️ 石棉检测</button>
            `;
            
            showBrowseArea();
            renderBrowsePage();
        }
        
        function filterBrowse(topic) {
            if (topic === 'all') {
                browseQuestions = [...questions];
            } else {
                browseQuestions = questions.filter(q => q.topic === topic);
            }
            currentBrowsePage = 0;
            
            // Update active button
            document.querySelectorAll('#browseTopics .topic-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(topic) || (topic === 'all' && btn.textContent.includes('全部'))) {
                    btn.classList.add('active');
                }
            });
            
            renderBrowsePage();
        }
        
        function showBrowseArea() {
            document.getElementById('modeSelect').classList.add('hidden');
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('browseArea').classList.remove('hidden');
        }
        
        function renderBrowsePage() {
            const listDiv = document.getElementById('browseList');
            const start = currentBrowsePage * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageItems = browseQuestions.slice(start, end);
            
            let html = '';
            pageItems.forEach((q, idx) => {
                const actualIdx = start + idx;
                const topicIcon = {'structure':'🏗️','roof':'🏠','plumbing':'💧','electrical':'⚡','hvac':'❄️','exterior':'🧱','safety':'🔥','infrared':'🌡️','radon':'☢️','mold':'🍄','asbestos':'⚠️'}[q.topic];
                const qData = q[currentLang];
                
                html += `
                    <div class="quiz-card" style="margin-bottom: 15px; padding: 15px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <span style="color: var(--primary);">${topicIcon} ${q.topic.toUpperCase()}</span>
                            <span style="color: var(--text-muted);">#${actualIdx + 1}</span>
                        </div>
                        <div style="font-size: 16px; margin-bottom: 10px;">${qData.question}</div>
                        <div style="font-size: 14px; color: var(--text-muted);">
                            ${qData.options.map((o, i) => `<div>${o}</div>`).join('')}
                        </div>
                        <div style="margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 8px;">
                            <div style="color: var(--primary); font-weight: bold;">✅ ${qData.options[qData.correct]}</div>
                            <div style="margin-top: 8px; color: var(--text-muted); font-size: 14px;">📖 ${qData.explanation}</div>
                        </div>
                    </div>
                `;
            });
            
            listDiv.innerHTML = html;
            
            // Render pagination
            const totalPages = Math.ceil(browseQuestions.length / ITEMS_PER_PAGE);
            let paginationHtml = '';
            if (currentBrowsePage > 0) {
                paginationHtml += `<button class="btn" onclick="changePage(-1)">◀ Prev</button>`;
            }
            paginationHtml += `<span style="padding: 10px;">${currentBrowsePage + 1} / ${totalPages} (${browseQuestions.length}题)</span>`;
            if (currentBrowsePage < totalPages - 1) {
                paginationHtml += `<button class="btn" onclick="changePage(1)">Next ▶</button>`;
            }
            document.getElementById('pagination').innerHTML = paginationHtml;
        }
        
        function changePage(delta) {
            currentBrowsePage += delta;
            renderBrowsePage();
            window.scrollTo(0, 0);
        }
        
        function startQuiz(topic) {
            mode = topic;
            if (topic === 'random') {
                quizQuestions = [...questions].sort(() => Math.random() - 0.5).slice(0, 10);
            } else {
                // Strictly use only questions from selected topic
                quizQuestions = questions.filter(q => q.topic === topic);
                // Shuffle but keep all from this topic
                quizQuestions = quizQuestions.sort(() => Math.random() - 0.5);
                // Show ALL questions from this topic (no limit)
            }
            currentIndex = 0;
            answers = [];
            
            document.getElementById('modeSelect').classList.add('hidden');
            document.getElementById('quizArea').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('browseArea').classList.add('hidden');
            document.getElementById('totalQ').textContent = quizQuestions.length;
            
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizQuestions[currentIndex];
            const langData = q[currentLang];
            
            document.getElementById('qNum').textContent = currentIndex + 1;
            document.getElementById('progressFill').style.width = ((currentIndex + 1) / quizQuestions.length * 100) + '%';
            document.getElementById('question').textContent = langData.question;
            
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            
            langData.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => selectOption(i);
                
                if (answers[currentIndex] !== undefined) {
                    div.classList.add('disabled');
                    if (i === langData.correct) {
                        div.classList.add('correct');
                    } else if (i === answers[currentIndex]) {
                        div.classList.add('wrong');
                    }
                }
                
                optionsEl.appendChild(div);
            });
            
            const expEl = document.getElementById('explanation');
            if (answers[currentIndex] !== undefined) {
                expEl.classList.remove('hidden');
                document.getElementById('explanationText').textContent = langData.explanation;
                
                document.getElementById('nextBtn').classList.remove('hidden');
                if (currentIndex === quizQuestions.length - 1) {
                    document.getElementById('nextBtn').classList.add('hidden');
                    document.getElementById('showResultBtn').classList.remove('hidden');
                }
            } else {
                expEl.classList.add('hidden');
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('showResultBtn').classList.add('hidden');
            }
            
            document.getElementById('prevBtn').classList.toggle('hidden', currentIndex === 0);
        }

        function selectOption(i) {
            if (answers[currentIndex] !== undefined) return;
            
            answers[currentIndex] = i;
            renderQuestion();
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < quizQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        function showResult() {
            let correct = 0;
            answers.forEach((ans, i) => {
                if (ans === quizQuestions[i][currentLang].correct) {
                    correct++;
                }
            });
            
            const total = quizQuestions.length;
            const percentage = Math.round((correct / total) * 100);
            
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            
            document.getElementById('scoreNum').textContent = percentage + '%';
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = total - correct;
        }

        function showModeSelect() {
            document.getElementById('modeSelect').classList.remove('hidden');
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
        }
    </script>
