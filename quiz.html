<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Home Inspection Quiz | 房屋检查题库</title>
    <style>
        :root {
            --primary: #4ade80;
            --primary-dark: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        h1 { text-align: center; margin-bottom: 30px; color: var(--primary); }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .lang-toggle {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            background: var(--card);
            color: var(--text);
        }
        
        .btn:hover { transform: translateY(-2px); }
        
        .btn-primary { background: var(--primary); color: #000; font-weight: bold; }
        .btn-danger { background: var(--danger); color: white; }
        
        .topics {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .topic-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
        }
        
        .topic-btn.active {
            background: var(--primary);
            color: #000;
        }
        
        .quiz-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .question-num {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .question {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            padding: 15px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .option:hover { background: rgba(255,255,255,0.1); }
        
        .option.selected {
            border-color: var(--info);
            background: rgba(59, 130, 246, 0.2);
        }
        
        .option.correct {
            border-color: var(--primary);
            background: rgba(74, 222, 128, 0.2);
        }
        
        .option.wrong {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.2);
        }
        
        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 10px;
            border-left: 4px solid var(--info);
        }
        
        .explanation-title {
            color: var(--info);
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .score-panel {
            text-align: center;
            padding: 40px;
        }
        
        .score-num {
            font-size: 64px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .score-label { color: var(--text-muted); margin-bottom: 20px; }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        
        .stat { text-align: center; }
        .stat-num { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; color: var(--text-muted); }
        
        .correct-count { color: var(--primary); }
        .wrong-count { color: var(--danger); }
        
        .hidden { display: none !important; }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }
        
        @media (max-width: 600px) {
            .header { flex-direction: column; }
            .stats { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Home Inspection Quiz | 房屋检查题库</h1>
        
        <div class="header">
            <div class="lang-toggle">
                <button class="btn" onclick="setLang('zh')">中文</button>
                <button class="btn" onclick="setLang('en')">English</button>
            </div>
            <button class="btn" onclick="showBrowseMode()">📚 Browse All / 浏览全部</button>
            <button class="btn btn-primary" onclick="showModeSelect()">🔄 New Quiz / 新测验</button>
        </div>
        
        <!-- Search Bar -->
        <div class="quiz-card" style="margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="搜索题目... (中英文)" 
                   style="width: 100%; padding: 12px; border-radius: 8px; border: none; 
                          background: var(--bg); color: var(--text); font-size: 16px;"
                   oninput="searchQuestions(this.value)">
            <div id="searchResults" style="margin-top: 10px; color: var(--text-muted);"></div>
        </div>
        
        <!-- Mode Selection -->
        <div id="modeSelect" class="quiz-card">
            <h2 style="margin-bottom: 20px;">Select Quiz Mode / 选择测验模式</h2>
            <div class="topics">
                <button class="topic-btn" onclick="startQuiz('random')">🎲 Random / 随机 (<span id="total-count">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('structure')">🏗️ Structure / 结构 (<span id="count-structure">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('roof')">🏠 Roof / 屋顶 (<span id="count-roof">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('plumbing')">💧 Plumbing / 水管 (<span id="count-plumbing">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('electrical')">⚡ Electrical / 电路 (<span id="count-electrical">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('hvac')">❄️ HVAC / 暖通 (<span id="count-hvac">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('exterior')">🧱 Exterior / 外墙 (<span id="count-exterior">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('safety')">🔥 Safety / 安全 (<span id="count-safety">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('infrared')">🌡️ Infrared / 红外检测 (<span id="count-infrared">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('radon')">☢️ Radon / 氡气检测 (<span id="count-radon">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('mold')">🍄 Mold / 霉菌检测 (<span id="count-mold">0</span>)</button>
                <button class="topic-btn" onclick="startQuiz('asbestos')">⚠️ Asbestos / 石棉检测 (<span id="count-asbestos">0</span>)</button>
            </div>
        </div>
        
        <!-- Quiz Area -->
        <div id="quizArea" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="quiz-card">
                <div class="question-num">
                    <span id="qNum">1</span> / <span id="totalQ">10</span>
                </div>
                <div class="question" id="question"></div>
                <div class="options" id="options"></div>
                <div class="explanation hidden" id="explanation">
                    <div class="explanation-title">📖 Explanation / 解析:</div>
                    <div id="explanationText"></div>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn" id="prevBtn" onclick="prevQuestion()">◀ Prev / 上一题</button>
                <button class="btn btn-primary hidden" id="nextBtn" onclick="nextQuestion()">Next ▶ / 下一题</button>
                <button class="btn btn-primary hidden" id="showResultBtn" onclick="showResult()">📊 Show Result / 查看结果</button>
            </div>
        </div>
        
        <!-- Result -->
        <div id="result" class="quiz-card hidden">
            <div class="score-panel">
                <div class="score-label" id="scoreLabel">Your Score / 你的得分</div>
                <div class="score-num" id="scoreNum">0</div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-num correct-count" id="correctCount">0</div>
                        <div class="stat-label">Correct / 正确</div>
                    </div>
                    <div class="stat">
                        <div class="stat-num wrong-count" id="wrongCount">0</div>
                        <div class="stat-label">Wrong / 错误</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="showModeSelect()">🔄 Try Again / 再试一次</button>
            </div>
        </div>
        
        <!-- Browse All Questions -->
        <div id="browseArea" class="quiz-card hidden">
            <h2 style="margin-bottom: 20px;">📚 题库浏览 / Browse All Questions</h2>
            <div class="topics" id="browseTopics"></div>
            <div id="browseList" style="margin-top: 20px;"></div>
            <div class="pagination" id="pagination" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        // Question Bank
const questions = [{"topic": "roof", "en": {"question": "The purpose of gravel on a built-up tar-and-gravel roof is?", "options": ["prevent delamination", "protect from UV", "provide ballast", "all of these"], "correct": 3, "explanation": "Gravel provides UV protection, ballast."}, "zh": {"question": "\u783e\u77f3\u5728\u7126\u6cb9\u5c4b\u9762\u4e0a\u7684\u4f5c\u7528\u662f\uff1f", "options": ["\u9632\u6b62\u5206\u5c42", "\u9632\u6b62\u7d2b\u5916\u7ebf", "\u63d0\u4f9b\u538b\u8f7d", "\u4ee5\u4e0a\u90fd\u662f"], "correct": 3, "explanation": "\u783e\u77f3\u63d0\u4f9b\u7d2b\u5916\u7ebf\u9632\u62a4\u548c\u538b\u8f7d\u3002"}}, {"topic": "roof", "en": {"question": "Ponding water remains how many hours after rain?", "options": ["12", "2", "24", "48"], "correct": 2, "explanation": "24+ hours."}, "zh": {"question": "\u79ef\u6c34\u5728\u96e8\u540e\u4fdd\u7559\u591a\u5c11\u5c0f\u65f6\uff1f", "options": ["12", "2", "24", "48"], "correct": 2, "explanation": "24\u5c0f\u65f6\u4ee5\u4e0a\u3002"}}, {"topic": "roof", "en": {"question": "Purpose of cant strip?", "options": ["prevent membrane cracking", "curb for skylight", "replace reglet", "seal parapet"], "correct": 0, "explanation": "Prevents membrane cracking."}, "zh": {"question": "\u6321\u6c34\u6761\u7684\u4f5c\u7528\uff1f", "options": ["\u9632\u6b62\u819c\u88c2\u5f00", "\u5929\u7a97\u5e95\u5ea7", "\u66ff\u6362\u51f9\u69fd", "\u5bc6\u5c01\u5973\u513f\u5899"], "correct": 0, "explanation": "\u9632\u6b62\u819c\u5f00\u88c2\u3002"}}, {"topic": "roof", "en": {"question": "Common built-up roofing problem except?", "options": ["alligatoring", "blistering", "oil-canning", "ridging"], "correct": 2, "explanation": "Oil-canning is metal roofing."}, "zh": {"question": "\u5e38\u89c1\u5e73\u5c4b\u9876\u95ee\u9898\u9664\u4e86\uff1f", "options": ["\u9cc4\u9c7c\u76ae", "\u8d77\u6ce1", "\u6ce2\u7eb9", "\u8d77\u810a"], "correct": 2, "explanation": "\u6ce2\u7eb9\u662f\u91d1\u5c5e\u5c4b\u9762\u95ee\u9898\u3002"}}, {"topic": "roof", "en": {"question": "4-in-12 slope ratio?", "options": ["1/4", "12:4", "4:12", "6:2:4"], "correct": 2, "explanation": "4 inches rise per 12 inches run."}, "zh": {"question": "4:12\u5761\u5ea6\u6bd4\u4f8b\uff1f", "options": ["1/4", "12:4", "4:12", "6:2:4"], "correct": 2, "explanation": "\u6bcf12\u82f1\u5bf8\u6c34\u5e73\u67094\u82f1\u5bf8\u4e0a\u5347\u3002"}}, {"topic": "roof", "en": {"question": "Low slope problem except?", "options": ["asphalt shingles", "fiber-cement", "roll roofing", "wood shakes", "wood shingles"], "correct": 2, "explanation": "Roll roofing suits low slope."}, "zh": {"question": "\u4f4e\u5761\u5ea6\u95ee\u9898\u9664\u4e86\uff1f", "options": ["\u6ca5\u9752\u74e6", "\u7ea4\u7ef4\u6c34\u6ce5", "\u5377\u6750\u5c4b\u9762", "\u6728\u74e6", "\u6728\u74e6\u677f"], "correct": 2, "explanation": "\u5377\u6750\u5c4b\u9762\u9002\u5408\u4f4e\u5761\u5ea6\u3002"}}, {"topic": "roof", "en": {"question": "Shortest life roofing material?", "options": ["concrete", "fiber cement", "roll roofing", "slate", "wood"], "correct": 2, "explanation": "Roll roofing shortest."}, "zh": {"question": "\u5bff\u547d\u6700\u77ed\u7684\u5c4b\u9762\u6750\u6599\uff1f", "options": ["\u6df7\u51dd\u571f", "\u7ea4\u7ef4\u6c34\u6ce5", "\u5377\u6750\u5c4b\u9762", "\u77f3\u677f", "\u6728\u6750"], "correct": 2, "explanation": "\u5377\u6750\u5c4b\u9762\u5bff\u547d\u6700\u77ed\u3002"}}, {"topic": "roof", "en": {"question": "Ice dams form on roofs with?", "options": ["low slope small overhang", "low slope wide overhang", "steep slope small", "steep slope wide"], "correct": 1, "explanation": "Low slope with wide overhang."}, "zh": {"question": "\u51b0\u575d\u5f62\u6210\u6761\u4ef6\uff1f", "options": ["\u4f4e\u5761\u5ea6\u5c0f\u60ac\u6311", "\u4f4e\u5761\u5ea6\u5927\u60ac\u6311", "\u9661\u5761\u5c0f\u60ac\u6311", "\u9661\u5761\u5927\u60ac\u6311"], "correct": 1, "explanation": "\u4f4e\u5761\u5ea6\u5927\u60ac\u6311\u3002"}}, {"topic": "roof", "en": {"question": "Minimum slope for asphalt shingles?", "options": ["2:12", "4             const optionsEl = document.getElementById('options');

            langData.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => selectOption(i);
                
                if (answers[currentIndex] !== undefined) {
                    div.classList.add('disabled');
                    if (i === langData.correct) {
                        div.classList.add('correct');
                    } else if (i === answers[currentIndex]) {
                        div.classList.add('wrong');
                    }
                }
                
                optionsEl.appendChild(div);
            });
            
            const expEl = document.getElementById('explanation');
            if (answers[currentIndex] !== undefined) {
                expEl.classList.remove('hidden');
                document.getElementById('explanationText').textContent = langData.explanation;
                
                document.getElementById('nextBtn').classList.remove('hidden');
                if (currentIndex === quizQuestions.length - 1) {
                    document.getElementById('nextBtn').classList.add('hidden');
                    document.getElementById('showResultBtn').classList.remove('hidden');
                }
            } else {
                expEl.classList.add('hidden');
                document.getElementById('nextBtn').classList.add('hidden');
                document.getElementById('showResultBtn').classList.add('hidden');
            }
            
            document.getElementById('prevBtn').classList.toggle('hidden', currentIndex === 0);
        }

        function selectOption(i) {
            if (answers[currentIndex] !== undefined) return;
            
            answers[currentIndex] = i;
            renderQuestion();
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < quizQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        function showResult() {
            let correct = 0;
            answers.forEach((ans, i) => {
                if (ans === quizQuestions[i][currentLang].correct) {
                    correct++;
                }
            });
            
            const total = quizQuestions.length;
            const percentage = Math.round((correct / total) * 100);
            
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            
            document.getElementById('scoreNum').textContent = percentage + '%';
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = total - correct;
        }

        function showModeSelect() {
            document.getElementById('modeSelect').classList.remove('hidden');
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
        }
