<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系探索 🚀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        #info h1 {
            font-size: 1.5rem;
            color: #00d9ff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00d9ff;
        }
        #info p {
            font-size: 0.85rem;
            color: #888;
            line-height: 1.6;
        }
        #planetName {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.8rem;
            text-shadow: 0 0 20px #00d9ff;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        #speedControl {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        #speedControl label {
            display: block;
            margin-bottom: 5px;
            color: #00d9ff;
        }
        #speedControl input {
            width: 150px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🚀 太阳系探索</h1>
        <p>
            <span class="key">W/A/S/D</span> 移动<br>
            <span class="key">鼠标</span> 旋转视角<br>
            <span class="key">滚轮</span> 缩放<br>
            <span class="key">1-8</span> 快速跳转行星<br>
            <span class="key">0</span> 返回太阳<br>
            <span class="key">空格</span> 暂停/继续
        </p>
    </div>
    <div id="speedControl">
        <label>时间速度: <span id="speedVal">1</span>x</label>
        <input type="range" id="speedSlider" min="0" max="10" step="0.1" value="1">
    </div>
    <div id="planetName"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 场景设置
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 星空背景
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 5000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i++) {
            starsPositions[i] = (Math.random() - 0.5) * 4000;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: true });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // 太阳
        const sunGeometry = new THREE.SphereGeometry(30, 64, 64);
        const sunMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffdd00,
            emissive: 0xffaa00,
            emissiveIntensity: 1
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // 太阳光晕
        const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({
            map: createGlowTexture(),
            color: 0xffaa00,
            transparent: true,
            blending: THREE.AdditiveBlending
        }));
        sunGlow.scale.set(150, 150, 1);
        sun.add(sunGlow);

        // 太阳光
        const sunLight = new THREE.PointLight(0xffffff, 2, 2000);
        scene.add(sunLight);
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        // 行星数据 (大小、距离、颜色、公转速度、自转速度)
        const planetsData = [
            { name: '水星', size: 2, distance: 60, color: 0xa0a0a0, speed: 0.04, rotateSpeed: 0.01 },
            { name: '金星', size: 4, distance: 90, color: 0xe6c35c, speed: 0.025, rotateSpeed: 0.005 },
            { name: '地球', size: 4.5, distance: 130, color: 0x4a90d9, speed: 0.02, rotateSpeed: 0.02 },
            { name: '火星', size: 3, distance: 170, color: 0xd1563e, speed: 0.016, rotateSpeed: 0.018 },
            { name: '木星', size: 12, distance: 240, color: 0xd4a574, speed: 0.008, rotateSpeed: 0.04 },
            { name: '土星', size: 10, distance: 320, color: 0xe6d4a8, speed: 0.006, rotateSpeed: 0.038 },
            { name: '天王星', size: 7, distance: 400, color: 0x7de3e3, speed: 0.004, rotateSpeed: 0.03 },
            { name: '海王星', size: 6.5, distance: 480, color: 0x4b70dd, speed: 0.003, rotateSpeed: 0.032 }
        ];

        const planets = [];
        const orbits = [];

        planetsData.forEach((data, index) => {
            // 轨道线
            const orbitGeometry = new THREE.RingGeometry(data.distance - 0.3, data.distance + 0.3, 128);
            const orbitMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x333355, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.3
            });
            const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);
            orbits.push(orbit);

            // 行星组（用于公转）
            const planetGroup = new THREE.Group();
            scene.add(planetGroup);

            // 行星
            const geometry = new THREE.SphereGeometry(data.size, 32, 32);
            const material = new THREE.MeshStandardMaterial({ 
                color: data.color,
                roughness: 0.8,
                metalness: 0.2
            });
            const planet = new THREE.Mesh(geometry, material);
            planet.position.x = data.distance;
            planet.userData = { 
                name: data.name, 
                distance: data.distance, 
                speed: data.speed,
                rotateSpeed: data.rotateSpeed,
                orbitAngle: Math.random() * Math.PI * 2
            };
            planetGroup.add(planet);

            // 土星环
            if (data.name === '土星') {
                const ringGeometry = new THREE.RingGeometry(data.size * 1.4, data.size * 2.2, 64);
                const ringMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0xc9b896,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.7
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.PI / 2;
                planet.add(ring);
            }

            planets.push({ mesh: planet, group: planetGroup, data: data });
        });

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, 'rgba(255, 200, 100, 1)');
            gradient.addColorStop(0.4, 'rgba(255, 150, 50, 0.5)');
            gradient.addColorStop(1, 'rgba(255, 100, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        // 相机控制
        let cameraDistance = 300;
        let cameraTheta = Math.PI / 4;
        let cameraPhi = Math.PI / 4;
        let targetX = 0, targetY = 0, targetZ = 0;
        let isPaused = false;
        let timeSpeed = 1;

        // 鼠标控制
        let isMouseDown = false;
        let lastMouseX = 0, lastMouseY = 0;

        document.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        document.addEventListener('mouseup', () => isMouseDown = false);

        document.addEventListener('mousemove', (e) => {
            if (isMouseDown) {
                const deltaX = e.clientX - lastMouseX;
                const deltaY = e.clientY - lastMouseY;
                cameraTheta -= deltaX * 0.005;
                cameraPhi = Math.max(0.1, Math.min(Math.PI - 0.1, cameraPhi - deltaY * 0.005));
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        document.addEventListener('wheel', (e) => {
            cameraDistance = Math.max(50, Math.min(1500, cameraDistance + e.deltaY * 0.5));
        });

        // 键盘控制
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            // 数字键跳转
            const num = parseInt(e.key);
            if (num >= 0 && num <= 8) {
                if (num === 0) {
                    targetX = 0; targetY = 0; targetZ = 0;
                    cameraDistance = 300;
                } else if (num <= planets.length) {
                    const p = planets[num - 1];
                    targetX = p.mesh.position.x;
                    targetY = 0;
                    targetZ = p.mesh.position.z;
                    cameraDistance = p.data.size * 8;
                }
            }
            
            if (e.key === ' ') {
                isPaused = !isPaused;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // 速度滑块
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        speedSlider.addEventListener('input', () => {
            timeSpeed = parseFloat(speedSlider.value);
            speedVal.textContent = timeSpeed;
        });

        // 更新行星位置
        function updatePlanets() {
            if (isPaused) return;
            
            planets.forEach((p, i) => {
                p.mesh.userData.orbitAngle += p.data.speed * timeSpeed;
                p.mesh.position.x = Math.cos(p.mesh.userData.orbitAngle) * p.data.distance;
                p.mesh.position.z = Math.sin(p.mesh.userData.orbitAngle) * p.data.distance;
                p.mesh.rotation.y += p.data.rotateSpeed * timeSpeed;
            });
        }

        // 更新相机
        function updateCamera() {
            // WASD 移动
            const moveSpeed = 5;
            if (keys['w']) { targetZ -= moveSpeed; targetX += Math.sin(cameraTheta) * moveSpeed; }
            if (keys['s']) { targetZ += moveSpeed; targetX -= Math.sin(cameraTheta) * moveSpeed; }
            if (keys['a']) { targetX -= moveSpeed * Math.cos(cameraTheta); targetZ += Math.sin(cameraTheta) * moveSpeed; }
            if (keys['d']) { targetX += moveSpeed * Math.cos(cameraTheta); targetZ -= Math.sin(cameraTheta) * moveSpeed; }

            camera.position.x = targetX + cameraDistance * Math.sin(cameraPhi) * Math.cos(cameraTheta);
            camera.position.y = targetY + cameraDistance * Math.cos(cameraPhi);
            camera.position.z = targetZ + cameraDistance * Math.sin(cameraPhi) * Math.sin(cameraTheta);
            camera.lookAt(targetX, targetY, targetZ);
        }

        // 显示当前行星名称
        function updatePlanetName() {
            const nameEl = document.getElementById('planetName');
            let closestPlanet = null;
            let closestDist = Infinity;

            planets.forEach(p => {
                const dx = p.mesh.position.x - camera.position.x;
                const dy = p.mesh.position.y - camera.position.y;
                const dz = p.mesh.position.z - camera.position.z;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                if (dist < closestDist && dist < p.data.size * 10) {
                    closestDist = dist;
                    closestPlanet = p;
                }
            });

            if (closestPlanet) {
                nameEl.textContent = closestPlanet.data.name;
                nameEl.style.opacity = 1;
            } else {
                nameEl.style.opacity = 0;
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            updatePlanets();
            updateCamera();
            updatePlanetName();
            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
