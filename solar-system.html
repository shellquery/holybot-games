<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太阳系探索 🚀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.75rem;
        }
        #info h1 {
            font-size: 1rem;
            color: #00d9ff;
            margin-bottom: 5px;
        }
        #info p {
            color: #888;
            line-height: 1.4;
        }
        #planetName {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.5rem;
            text-shadow: 0 0 20px #00d9ff;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        #speedControl {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
        }
        #speedControl label {
            font-size: 0.75rem;
            color: #00d9ff;
        }
        
        /* 移动端控制按钮 */
        .mobile-controls {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            gap: 5px;
        }
        @media (max-width: 768px) {
            .mobile-controls { display: flex; }
            #info { display: none; }
        }
        .planet-btns {
            display: flex;
            gap: 5px;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        .planet-btn {
            background: rgba(0,0,0,0.8);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.75rem;
        }
        .zoom-btns {
            display: flex;
            gap: 5px;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }
        .zoom-btn {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🚀 太阳系</h1>
        <p>
            拖动旋转 | 滚轮缩放<br>
            1-8 行星 | 0 太阳
        </p>
    </div>
    <div id="speedControl">
        <label>速度: <span id="speedVal">1</span>x</label><br>
        <input type="range" id="speedSlider" min="0" max="10" step="0.1" value="1">
    </div>
    <div id="planetName"></div>
    
    <!-- 移动端按钮 -->
    <div class="zoom-btns">
        <div class="zoom-btn" id="zoomIn">+</div>
        <div class="zoom-btn" id="zoomOut">-</div>
    </div>
    
    <div class="planet-btns">
        <button class="planet-btn" data-planet="0">☀️</button>
        <button class="planet-btn" data-planet="1">水</button>
        <button class="planet-btn" data-planet="2">金</button>
        <button class="planet-btn" data-planet="3">地</button>
        <button class="planet-btn" data-planet="4">火</button>
        <button class="planet-btn" data-planet="5">木</button>
        <button class="planet-btn" data-planet="6">土</button>
        <button class="planet-btn" data-planet="7">天</button>
        <button class="planet-btn" data-planet="8">海</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 星空
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 3000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i++) {
            starsPositions[i] = (Math.random() - 0.5) * 3000;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: true });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // 太阳
        const sunGeometry = new THREE.SphereGeometry(25, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdd00, emissive: 0xffaa00, emissiveIntensity: 1 });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        const sunLight = new THREE.PointLight(0xffffff, 2, 1500);
        scene.add(sunLight);
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        // 行星数据
        const planetsData = [
            { name: '水星', size: 2, distance: 50, color: 0xa0a0a0, speed: 0.04 },
            { name: '金星', size: 3.5, distance: 75, color: 0xe6c35c, speed: 0.025 },
            { name: '地球', size: 4, distance: 105, color: 0x4a90d9, speed: 0.02 },
            { name: '火星', size: 2.5, distance: 135, color: 0xd1563e, speed: 0.016 },
            { name: '木星', size: 10, distance: 190, color: 0xd4a574, speed: 0.008 },
            { name: '土星', size: 8.5, distance: 250, color: 0xe6d4a8, speed: 0.006 },
            { name: '天王星', size: 6, distance: 310, color: 0x7de3e3, speed: 0.004 },
            { name: '海王星', size: 5.5, distance: 360, color: 0x4b70dd, speed: 0.003 }
        ];

        const planets = [];

        planetsData.forEach((data) => {
            const orbitGeometry = new THREE.RingGeometry(data.distance - 0.2, data.distance + 0.2, 64);
            const orbitMaterial = new THREE.MeshBasicMaterial({ color: 0x333355, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
            const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);

            const planetGroup = new THREE.Group();
            scene.add(planetGroup);

            const geometry = new THREE.SphereGeometry(data.size, 24, 24);
            const material = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.8, metalness: 0.2 });
            const planet = new THREE.Mesh(geometry, material);
            planet.position.x = data.distance;
            planet.userData = { name: data.name, distance: data.distance, speed: data.speed, orbitAngle: Math.random() * Math.PI * 2 };
            planetGroup.add(planet);

            if (data.name === '土星') {
                const ringGeometry = new THREE.RingGeometry(data.size * 1.3, data.size * 2, 32);
                const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xc9b896, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.PI / 2;
                planet.add(ring);
            }

            planets.push({ mesh: planet, group: planetGroup, data: data });
        });

        // 相机控制
        let cameraDistance = 250;
        let cameraTheta = Math.PI / 4;
        let cameraPhi = Math.PI / 4;
        let targetX = 0, targetY = 0, targetZ = 0;
        let isPaused = false;
        let timeSpeed = 1;

        let isMouseDown = false;
        let lastMouseX = 0, lastMouseY = 0;

        document.addEventListener('mousedown', (e) => { isMouseDown = true; lastMouseX = e.clientX; lastMouseY = e.clientY; });
        document.addEventListener('mouseup', () => isMouseDown = false);
        document.addEventListener('mousemove', (e) => {
            if (isMouseDown) {
                cameraTheta -= (e.clientX - lastMouseX) * 0.005;
                cameraPhi = Math.max(0.1, Math.min(Math.PI - 0.1, cameraPhi - (e.clientY - lastMouseY) * 0.005));
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        // 触摸控制
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        });
        
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                const dx = e.touches[0].clientX - touchStartX;
                const dy = e.touches[0].clientY - touchStartY;
                cameraTheta -= dx * 0.005;
                cameraPhi = Math.max(0.1, Math.min(Math.PI - 0.1, cameraPhi - dy * 0.005));
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        }, { passive: false });

        // 滚轮缩放
        document.addEventListener('wheel', (e) => {
            cameraDistance = Math.max(50, Math.min(800, cameraDistance + e.deltaY * 0.5));
        });

        // 键盘
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            const num = parseInt(e.key);
            if (num === 0) { targetX = 0; targetY = 0; targetZ = 0; cameraDistance = 250; }
            else if (num >= 1 && num <= planets.length) {
                const p = planets[num - 1];
                targetX = p.mesh.position.x; targetY = 0; targetZ = p.mesh.position.z;
                cameraDistance = p.data.size * 8;
            }
            if (e.key === ' ') { isPaused = !isPaused; e.preventDefault(); }
        });
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // 速度滑块
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            timeSpeed = parseFloat(e.target.value);
            document.getElementById('speedVal').textContent = timeSpeed;
        });

        // 移动端按钮
        document.getElementById('zoomIn').onclick = () => cameraDistance = Math.max(50, cameraDistance - 30);
        document.getElementById('zoomOut').onclick = () => cameraDistance = Math.min(800, cameraDistance + 30);

        document.querySelectorAll('.planet-btn').forEach(btn => {
            btn.onclick = () => {
                const idx = parseInt(btn.dataset.planet);
                if (idx === 0) { targetX = 0; targetY = 0; targetZ = 0; cameraDistance = 250; }
                else {
                    const p = planets[idx - 1];
                    targetX = p.mesh.position.x; targetY = 0; targetZ = p.mesh.position.z;
                    cameraDistance = p.data.size * 8;
                }
            };
        });

        function updatePlanets() {
            if (isPaused) return;
            planets.forEach((p) => {
                p.mesh.userData.orbitAngle += p.data.speed * timeSpeed;
                p.mesh.position.x = Math.cos(p.mesh.userData.orbitAngle) * p.data.distance;
                p.mesh.position.z = Math.sin(p.mesh.userData.orbitAngle) * p.data.distance;
            });
        }

        function updateCamera() {
            camera.position.x = targetX + cameraDistance * Math.sin(cameraPhi) * Math.cos(cameraTheta);
            camera.position.y = targetY + cameraDistance * Math.cos(cameraPhi);
            camera.position.z = targetZ + cameraDistance * Math.sin(cameraPhi) * Math.sin(cameraTheta);
            camera.lookAt(targetX, targetY, targetZ);
        }

        function updatePlanetName() {
            const nameEl = document.getElementById('planetName');
            let closest = null;
            let closestDist = Infinity;
            planets.forEach(p => {
                const dx = p.mesh.position.x - camera.position.x;
                const dy = p.mesh.position.y - camera.position.y;
                const dz = p.mesh.position.z - camera.position.z;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                if (dist < closestDist && dist < p.data.size * 15) { closestDist = dist; closest = p; }
            });
            nameEl.textContent = closest ? closest.data.name : '';
            nameEl.style.opacity = closest ? 1 : 0;
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePlanets();
            updateCamera();
            updatePlanetName();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
