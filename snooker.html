<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Snooker - Play Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #4ade80; }
        .score { font-size: 18px; margin: 5px 0; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
        }
        .power-bar {
            width: 300px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #fbbf24, #ef4444);
            width: 0%;
            transition: width 0.1s;
        }
        button {
            background: #4ade80;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74,222,128,0.5);
            z-index: 200;
            display: none;
        }
        .instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            max-width: 250px;
        }
        .instructions h3 { color: #4ade80; margin-bottom: 10px; }
        .instructions p { font-size: 14px; margin: 5px 0; color: #ccc; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-overlay">
        <h1>🎱 3D Snooker</h1>
        <div class="score">Player: <span id="player">You</span></div>
        <div class="score">Score: <span id="score">0</span></div>
        <div class="score">Balls Pocketed: <span id="pocketed">0</span>/21</div>
    </div>
    
    <div class="instructions">
        <h3>How to Play</h3>
        <p>🖱️ <strong>Drag</strong> to aim</p>
        <p>🔒 <strong>Hold</strong> to charge power</p>
        <p>🚀 <strong>Release</strong> to shoot</p>
        <p>🎯 Pot all red balls first!</p>
    </div>
    
    <div class="controls">
        <button onclick="resetGame()">🔄 New Game</button>
        <button onclick="toggleView()">👁️ Toggle View</button>
        <div class="power-bar">
            <div class="power-fill" id="power-fill"></div>
        </div>
    </div>
    
    <div id="message"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game state
        let scene, camera, renderer;
        let cueBall, balls = [];
        let isDragging = false;
        let isCharging = false;
        let dragStart = { x: 0, y: 0 };
        let cueAngle = 0;
        let power = 0;
        let score = 0;
        let pocketedBalls = 0;
        let gameOver = false;
        let topView = false;
        
        // Physics constants
        const FRICTION = 0.985;
        const TABLE_WIDTH = 2.54;
        const TABLE_HEIGHT = 1.27;
        const BALL_RADIUS = 0.028;
        const POCKET_RADIUS = 0.05;
        
        // Table pockets positions
        const pockets = [
            { x: -TABLE_WIDTH/2 + 0.02, z: -TABLE_HEIGHT/2 + 0.02 },
            { x: 0, z: -TABLE_HEIGHT/2 + 0.01 },
            { x: TABLE_WIDTH/2 - 0.02, z: -TABLE_HEIGHT/2 + 0.02 },
            { x: -TABLE_WIDTH/2 + 0.02, z: TABLE_HEIGHT/2 - 0.02 },
            { x: 0, z: TABLE_HEIGHT/2 - 0.01 },
            { x: TABLE_WIDTH/2 - 0.02, z: TABLE_HEIGHT/2 - 0.02 }
        ];
        
        // Ball colors (snooker colors)
        const ballColors = [
            0xffffff, // Cue ball
            0xff0000, // Red (15 balls)
            0xffd700, // Yellow
            0x00ff00, // Green
            0x8b4513, // Brown
            0x0000ff, // Blue
            0xff69b4, // Pink
            0x000000  // Black
        ];
        
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 2);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(0, 3, 0);
            spotLight.castShadow = true;
            scene.add(spotLight);
            
            // Table
            createTable();
            
            // Balls
            createBalls();
            
            // Event listeners
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('touchstart', onTouchStart);
            renderer.domElement.addEventListener('touchmove', onTouchMove);
            renderer.domElement.addEventListener('touchend', onTouchEnd);
            window.addEventListener('resize', onWindowResize);
            
            // Start animation
            animate();
        }
        
        function createTable() {
            // Table surface (green felt)
            const tableGeometry = new THREE.BoxGeometry(TABLE_WIDTH, 0.02, TABLE_HEIGHT);
            const tableMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x0d5c2e,
                roughness: 0.8
            });
            const table = new THREE.Mesh(tableGeometry, tableMaterial);
            table.position.y = -BALL_RADIUS;
            table.receiveShadow = true;
            scene.add(table);
            
            // Table frame (wood)
            const frameMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x4a2c0a,
                roughness: 0.6
            });
            
            // Rails
            const railGeometry = new THREE.BoxGeometry(TABLE_WIDTH + 0.1, 0.05, 0.03);
            const railMaterial = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
            
            // Top rail
            const topRail = new THREE.Mesh(railGeometry, railMaterial);
            topRail.position.set(0, 0.025, -TABLE_HEIGHT/2 - 0.02);
            scene.add(topRail);
            
            // Bottom rail
            const bottomRail = new THREE.Mesh(railGeometry, railMaterial);
            bottomRail.position.set(0, 0.025, TABLE_HEIGHT/2 + 0.02);
            scene.add(bottomRail);
            
            const sideRailGeometry = new THREE.BoxGeometry(0.03, 0.05, TABLE_HEIGHT + 0.1);
            
            // Left rail
            const leftRail = new THREE.Mesh(sideRailGeometry, railMaterial);
            leftRail.position.set(-TABLE_WIDTH/2 - 0.02, 0.025, 0);
            scene.add(leftRail);
            
            // Right rail
            const rightRail = new THREE.Mesh(sideRailGeometry, railMaterial);
            rightRail.position.set(TABLE_WIDTH/2 + 0.02, 0.025, 0);
            scene.add(rightRail);
            
            // Pockets
            const pocketGeometry = new THREE.CircleGeometry(POCKET_RADIUS, 32);
            const pocketMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
            
            pockets.forEach(p => {
                const pocket = new THREE.Mesh(pocketGeometry, pocketMaterial);
                pocket.rotation.x = -Math.PI / 2;
                pocket.position.set(p.x, 0.001, p.z);
                scene.add(pocket);
            });
            
            // Legs
            const legGeometry = new THREE.CylinderGeometry(0.03, 0.04, 0.5, 8);
            const legMaterial = new THREE.MeshStandardMaterial({ color: 0x4a2c0a });
            
            const legPositions = [
                [-TABLE_WIDTH/2 + 0.1, -0.25, -TABLE_HEIGHT/2 + 0.1],
                [TABLE_WIDTH/2 - 0.1, -0.25, -TABLE_HEIGHT/2 + 0.1],
                [-TABLE_WIDTH/2 + 0.1, -0.25, TABLE_HEIGHT/2 - 0.1],
                [TABLE_WIDTH/2 - 0.1, -0.25, TABLE_HEIGHT/2 - 0.1]
            ];
            
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(legGeometry, legMaterial);
                leg.position.set(...pos);
                scene.add(leg);
            });
        }
        
        function createBalls() {
            balls = [];
            
            const ballGeometry = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
            
            // Cue ball
            const cueMaterial = new THREE.MeshStandardMaterial({ 
                color: ballColors[0],
                roughness: 0.2,
                metalness: 0.1
            });
            cueBall = new THREE.Mesh(ballGeometry, cueMaterial);
            cueBall.position.set(-TABLE_WIDTH/4, BALL_RADIUS, 0);
            cueBall.castShadow = true;
            cueBall.userData = { velocity: { x: 0, z: 0 }, isCue: true };
            scene.add(cueBall);
            balls.push(cueBall);
            
            // Red balls (15)
            for (let i = 0; i < 15; i++) {
                const material = new THREE.MeshStandardMaterial({ 
                    color: ballColors[1],
                    roughness: 0.2,
                    metalness: 0.1
                });
                const ball = new THREE.Mesh(ballGeometry, material);
                
                // Triangle formation
                const row = Math.floor(i / 5);
                const col = i % 5;
                const startX = TABLE_WIDTH/4 + 0.1;
                const startZ = (col - 2) * BALL_RADIUS * 2.1;
                
                ball.position.set(
                    startX + row * BALL_RADIUS * 1.8,
                    BALL_RADIUS,
                    startZ + (row * BALL_RADIUS * 1.05)
                );
                ball.castShadow = true;
                ball.userData = { velocity: { x: 0, z: 0 }, color: 1 };
                scene.add(ball);
                balls.push(ball);
            }
            
            // Colored balls (yellow, green, brown, blue, pink, black)
            const coloredPositions = [
                { x: -TABLE_WIDTH/4, z: -TABLE_HEIGHT/4, color: 2 },  // Yellow
                { x: -TABLE_WIDTH/4, z: TABLE_HEIGHT/4, color: 3 },    // Green
                { x: -TABLE_WIDTH/4, z: 0, color: 4 },               // Brown
                { x: 0, z: 0, color: 5 },                             // Blue
                { x: TABLE_WIDTH/4, z: TABLE_HEIGHT/4, color: 6 },   // Pink
                { x: TABLE_WIDTH/4, z: -TABLE_HEIGHT/4, color: 7 }   // Black
            ];
            
            coloredPositions.forEach(pos => {
                const material = new THREE.MeshStandardMaterial({ 
                    color: ballColors[pos.color],
                    roughness: 0.2,
                    metalness: 0.1
                });
                const ball = new THREE.Mesh(ballGeometry, material);
                ball.position.set(pos.x, BALL_RADIUS, pos.z);
                ball.castShadow = true;
                ball.userData = { velocity: { x: 0, z: 0 }, color: pos.color };
                scene.add(ball);
                balls.push(ball);
            });
        }
        
        function onMouseDown(event) {
            if (gameOver || isBallsMoving()) return;
            
            isDragging = true;
            dragStart.x = event.clientX;
            dragStart.y = event.clientY;
        }
        
        function onMouseMove(event) {
            if (!isDragging || gameOver) return;
            
            const dx = event.clientX - dragStart.x;
            const dy = event.clientY - dragStart.y;
            
            cueAngle = Math.atan2(dy, dx);
            
            // Show aim line
            updateAimLine();
        }
        
        function onMouseUp(event) {
            if (!isDragging || gameOver) return;
            
            const dx = event.clientX - dragStart.x;
            const dy = event.clientY - dragStart.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > 10) {
                shoot(cueAngle, Math.min(distance / 5, 50));
            }
            
            isDragging = false;
        }
        
        function onTouchStart(event) {
            event.preventDefault();
            const touch = event.touches[0];
            onMouseDown({ clientX: touch.clientX, clientY: touch.clientY });
        }
        
        function onTouchMove(event) {
            event.preventDefault();
            const touch = event.touches[0];
            onMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
        }
        
        function onTouchEnd(event) {
            const touch = event.changedTouches[0];
            onMouseUp({ clientX: touch.clientX, clientY: touch.clientY });
        }
        
        function shoot(angle, force) {
            const speed = force * 0.001;
            cueBall.userData.velocity.x = Math.cos(angle) * speed;
            cueBall.userData.velocity.z = Math.sin(angle) * speed;
        }
        
        function updateAimLine() {
            // Simple aim indicator
            const lineLength = 0.3;
            const endX = cueBall.position.x + Math.cos(cueAngle) * lineLength;
            const endZ = cueBall.position.z + Math.sin(cueAngle) * lineLength;
            
            // Visual feedback could be added here
        }
        
        function isBallsMoving() {
            return balls.some(ball => {
                const v = ball.userData.velocity;
                return Math.abs(v.x) > 0.0001 || Math.abs(v.z) > 0.0001;
            });
        }
        
        function updatePhysics() {
            balls.forEach(ball => {
                const vel = ball.userData.velocity;
                
                // Update position
                ball.position.x += vel.x;
                ball.position.z += vel.z;
                
                // Apply friction
                vel.x *= FRICTION;
                vel.z *= FRICTION;
                
                // Stop if very slow
                if (Math.abs(vel.x) < 0.0001) vel.x = 0;
                if (Math.abs(vel.z) < 0.0001) vel.z = 0;
                
                // Wall collisions
                if (ball.position.x < -TABLE_WIDTH/2 + BALL_RADIUS) {
                    ball.position.x = -TABLE_WIDTH/2 + BALL_RADIUS;
                    vel.x *= -0.8;
                }
                if (ball.position.x > TABLE_WIDTH/2 - BALL_RADIUS) {
                    ball.position.x = TABLE_WIDTH/2 - BALL_RADIUS;
                    vel.x *= -0.8;
                }
                if (ball.position.z < -TABLE_HEIGHT/2 + BALL_RADIUS) {
                    ball.position.z = -TABLE_HEIGHT/2 + BALL_RADIUS;
                    vel.z *= -0.8;
                }
                if (ball.position.z > TABLE_HEIGHT/2 - BALL_RADIUS) {
                    ball.position.z = TABLE_HEIGHT/2 - BALL_RADIUS;
                    vel.z *= -0.8;
                }
            });
            
            // Ball-ball collisions
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    
                    const dx = b2.position.x - b1.position.x;
                    const dz = b2.position.z - b1.position.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    
                    if (dist < BALL_RADIUS * 2) {
                        // Collision!
                        const nx = dx / dist;
                        const nz = dz / dist;
                        
                        const v1n = b1.userData.velocity.x * nx + b1.userData.velocity.z * nz;
                        const v2n = b2.userData.velocity.x * nx + b2.userData.velocity.z * nz;
                        
                        b1.userData.velocity.x += (v2n - v1n) * nx;
                        b1.userData.velocity.z += (v2n - v1n) * nz;
                        b2.userData.velocity.x += (v1n - v2n) * nx;
                        b2.userData.velocity.z += (v1n - v2n) * nz;
                        
                        // Separate balls
                        const overlap = BALL_RADIUS * 2 - dist;
                        b1.position.x -= overlap * nx / 2;
                        b1.position.z -= overlap * nz / 2;
                        b2.position.x += overlap * nx / 2;
                        b2.position.z += overlap * nz / 2;
                    }
                }
            }
            
            // Pocket detection
            balls.forEach((ball, index) => {
                if (ball.userData.isCue) return; // Don't pocket cue ball
                
                pockets.forEach(pocket => {
                    const dx = ball.position.x - pocket.x;
                    const dz = ball.position.z - pocket.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    
                    if (dist < POCKET_RADIUS) {
                        // Ball pocketed!
                        const color = ball.userData.color;
                        
                        if (color === 1) {
                            // Red ball
                            score += 1;
                        } else if (color >= 2 && color <= 7) {
                            // Colored ball
                            score += [2, 3, 4, 4, 5, 6, 7][color - 2];
                        }
                        
                        pocketedBalls++;
                        scene.remove(ball);
                        balls.splice(balls.indexOf(ball), 1);
                        
                        updateUI();
                        
                        if (pocketedBalls >= 21) {
                            showMessage("🎉 You Win!");
                            gameOver = true;
                        }
                    }
                });
            });
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('pocketed').textContent = pocketedBalls;
        }
        
        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }
        
        function resetGame() {
            // Remove all balls
            balls.forEach(ball => scene.remove(ball));
            
            score = 0;
            pocketedBalls = 0;
            gameOver = false;
            
            createBalls();
            updateUI();
            
            document.getElementById('message').style.display = 'none';
        }
        
        function toggleView() {
            topView = !topView;
            
            if (topView) {
                camera.position.set(0, 3, 0);
                camera.lookAt(0, 0, 0);
            } else {
                camera.position.set(0, 2, 2);
                camera.lookAt(0, 0, 0);
            }
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (!gameOver) {
                updatePhysics();
            }
            
            renderer.render(scene, camera);
        }
        
        // Start game
        init();
    </script>
</body>
</html>
